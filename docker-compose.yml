version: "3.9"

# ─────────────────────────────────────────────────────────────────
# AI Resume Analyzer — Service Orchestration
# Services are configured progressively across phases.
# ─────────────────────────────────────────────────────────────────

services:

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    # volumes and full config added in Phase 8

  # ── Express Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - ml-service
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/resume_analyzer
      - ML_SERVICE_URL=http://ml-service:8000
    # volumes and full config added in Phase 8

  # ── FastAPI ML Service ───────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/ml.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # volumes and full config added in Phase 8

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_analyzer
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

volumes:
  postgres-data: